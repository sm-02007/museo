<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocadiscos Semanal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app">

        <!-- Playlist side -->
        <aside class="playlist-panel">
            <div class="panel-header">
                <span class="panel-label">Now playing</span>
                <button class="icon-btn" id="btn-playlist-toggle" title="Cerrar playlist">
                    <i class="fa-solid fa-list"></i>
                </button>
            </div>
            <ul class="playlist" id="playlist">
                <!-- JS fills this -->
            </ul>
        </aside>

        <!-- Player card -->
        <main class="player-card">

            <!-- Album strip (mini covers) -->
            <div class="cover-strip" id="cover-strip">
                <!-- JS fills with prev/current/next -->
            </div>

            <!-- Vinyl stage -->
            <div class="vinyl-stage">
                <div class="tonearm-wrapper">
                    <div class="tonearm" id="tonearm"></div>
                </div>
                <div class="vinyl-wrapper" id="vinyl-wrapper">
                    <div class="vinyl" id="vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-label" id="vinyl-label">
                                <img src="" alt="" id="label-img">
                            </div>
                        </div>
                        <div class="vinyl-grooves"></div>
                    </div>
                </div>
            </div>

            <!-- Song info -->
            <div class="song-info">
                <div class="song-meta">
                    <p class="song-artist" id="song-artist">Pink Floyd</p>
                    <h2 class="song-title" id="song-title">Dark Side of the Moon</h2>
                </div>
                <button class="heart-btn" id="btn-heart" title="Me gusta">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <!-- Progress -->
            <div class="progress-area">
                <div class="progress-bar-wrap" id="progress-wrap">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-thumb" id="progress-thumb"></div>
                    </div>
                </div>
                <div class="time-row">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="ctrl-btn secondary" id="btn-shuffle" title="Aleatorio">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button class="ctrl-btn" id="btn-prev" title="Anterior">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                </button>
                <button class="ctrl-btn" id="btn-next" title="Siguiente">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <button class="ctrl-btn secondary" id="btn-repeat" title="Repetir">
                    <i class="fa-solid fa-repeat"></i>
                </button>
            </div>

            <!-- Volume -->
            <div class="volume-row">
                <i class="fa-solid fa-volume-low vol-icon"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="volume-slider">
                <i class="fa-solid fa-volume-high vol-icon"></i>
            </div>

            <audio id="audio"></audio>
        </main>

    </div>

    <script src="script.js"></script>
</body>

</html>
